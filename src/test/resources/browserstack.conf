# BrowserStack Configuration
# Para ejecutar: mvn clean verify -Denvironment=browserstack -Dplatform=windows

serenity {
    take.screenshots = FOR_FAILURES
    take.screenshots = FOR_EACH_ACTION
    take.screenshots = AFTER_EACH_STEP
}

webdriver.base.url = "https://webx.muthematrix.com/"

# Configuración base de BrowserStack
browserstack {
  user = "david3360"
  key = "CHYMa7RyuRpFNz6T3t8q"
  local = false
  server = "hub-cloud.browserstack.com"
}

# Plataformas disponibles
platforms {
  # Windows 10 + Chrome Latest (Última versión)
  windows {
    webdriver {
      driver = remote
      remote.url = "https://david3360:CHYMa7RyuRpFNz6T3t8q@hub-cloud.browserstack.com/wd/hub"

      timeouts {
        implicitlywait = 15000
        pageload = 40000
      }

      capabilities {
        browserName = "Chrome"
        browserVersion = "latest"
        "bstack:options" {
          os = "Windows"
          osVersion = "10"
          projectName = "BrowserStack Sample"
          buildName = "browserstack-build-1"
          sessionName = "Muthematrix Vote - Windows Chrome Latest"
          local = "false"
          debug = "true"
          networkLogs = "true"
          consoleLogs = "info"
          seleniumVersion = "4.0.0"
          timezone = "America/Bogota"
        }
        acceptInsecureCerts = true
        "goog:chromeOptions" {
          args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors",
                  "start-maximized", "disable-infobars", "disable-gpu"]
          prefs {
            "profile.default_content_setting_values.geolocation" = 1
          }
        }
      }
    }
  }

  # macOS Monterey + Safari 15.6
  mac {
    webdriver {
      driver = remote
      remote.url = "https://david3360:CHYMa7RyuRpFNz6T3t8q@hub-cloud.browserstack.com/wd/hub"

      timeouts {
        implicitlywait = 15000
        pageload = 40000
      }

      capabilities {
        browserName = "Safari"
        browserVersion = "15.6"
        "bstack:options" {
          os = "OS X"
          osVersion = "Monterey"
          projectName = "BrowserStack Sample"
          buildName = "browserstack-build-1"
          sessionName = "Muthematrix Vote - Mac Safari"
          local = "false"
          debug = "true"
          networkLogs = "true"
          consoleLogs = "info"
          seleniumVersion = "4.0.0"
          timezone = "America/Bogota"
        }
        acceptInsecureCerts = true
      }
    }
  }

  # iPhone 13 + Chromium
  iphone {
    webdriver {
      driver = remote
      remote.url = "https://david3360:CHYMa7RyuRpFNz6T3t8q@hub-cloud.browserstack.com/wd/hub"

      timeouts {
        implicitlywait = 20000
        pageload = 50000
      }

      capabilities {
        browserName = "chrome"
        "bstack:options" {
          deviceName = "iPhone 13"
          osVersion = "15"
          realMobile = "true"
          deviceOrientation = "portrait"
          projectName = "BrowserStack Sample"
          buildName = "browserstack-build-1"
          sessionName = "Muthematrix Vote - iPhone 13"
          local = "false"
          debug = "true"
          networkLogs = "true"
          consoleLogs = "info"
          timezone = "America/Bogota"
        }
        acceptInsecureCerts = true
      }
    }
  }
}

