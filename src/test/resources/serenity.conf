serenity {
    take.screenshots = FOR_FAILURES
    take.screenshots = FOR_EACH_ACTION
    take.screenshots = AFTER_EACH_STEP
}

# Configuración por defecto para LOCAL
headless.mode = false

webdriver.base.url = "https://webx.muthematrix.com/"

webdriver {
  driver = chrome
  timeouts {
    implicitlywait = 10000
    pageload = 30000
  }
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized",
        "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
        "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
    }
  }
}

environments {
  # ENTORNO LOCAL (por defecto)
  default {
    webdriver.base.url = "https://webx.muthematrix.com/"
  }

  # ENTORNO CI (solo se usa cuando pasas -Denvironment=ci)
  ci {
    webdriver.base.url = "https://webx.muthematrix.com/"
    headless.mode = true
    webdriver {
      timeouts {
        implicitlywait = 15000
        pageload = 40000
      }
      capabilities {
        "goog:chromeOptions" {
          args = [
            "remote-allow-origins=*",
            "no-sandbox",
            "ignore-certificate-errors",
            "incognito",
            "disable-infobars",
            "disable-gpu",
            "disable-dev-shm-usage",
            "disable-extensions",
            "headless=new",           # ← Usar headless moderno
            "window-size=1920,1080",
            "--disable-blink-features=AutomationControlled",  # ← NUEVO: Evita detección
            "--user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/141.0.0.0 Safari/537.36"  # ← NUEVO: User-agent real
          ]
          excludeSwitches = ["enable-automation"]  # ← NUEVO: Oculta automation
        }
      }
    }
    serenity {
      step.delay = 1000  # ← NUEVO: Delay entre steps
      timeout = 30000    # ← NUEVO: Timeout general
    }
  }

  # ENTORNO BROWSERSTACK - Una sola cuenta con múltiples plataformas
  browserstack {
    webdriver.base.url = "https://webx.muthematrix.com/"
    webdriver.driver = remote

    browserstack.user = ${?BROWSERSTACK_USER}
    browserstack.key = ${?BROWSERSTACK_KEY}
    browserstack.local = false

    webdriver {
      timeouts {
        implicitlywait = 15000
        pageload = 40000
      }
      capabilities {
        browserName = "Chrome"
        browserVersion = "latest"

        "bstack:options" {
          os = "Windows"
          osVersion = "10"
          projectName = "Muthematrix Voting Tests"
          buildName = "browserstack-multi-platform"
          sessionName = "Muthematrix Vote Test"
          local = "false"
          debug = "true"
          networkLogs = "true"
          consoleLogs = "info"
          seleniumVersion = "4.0.0"
          timezone = "America/Bogota"
          userName = ${?BROWSERSTACK_USER}
          accessKey = ${?BROWSERSTACK_KEY}
        }

        acceptInsecureCerts = true

        "goog:chromeOptions" {
          args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized",
            "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking"]

          prefs {
            "profile.default_content_setting_values.geolocation" = 1
            "profile.default_content_settings.geolocation" = 1
          }
        }
      }
    }
  }
}

