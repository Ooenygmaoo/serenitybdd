name: BrowserStack Tests - Windows Chrome (11 AM & 11 PM Colombia)

on:
  push:
    branches: [master]

  workflow_dispatch:   # Permite ejecución manual

  schedule:
    - cron: '0 16 * * *'   # 11:00 AM Colombia (UTC-5 → 16:00 UTC)
    - cron: '0 4 * * *'    # 11:00 PM Colombia (UTC-5 → 04:00 UTC del día siguiente)


jobs:
  browserstack-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests en BrowserStack
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
        run: |
          echo "🚀 Iniciando tests en BrowserStack..."
          echo "Usuario BrowserStack: ${BROWSERSTACK_USER}"
          mvn clean verify \
            -Dcucumber.filter.tags="@webMuthematrix" \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -Dwebdriver.driver=remote \
            -Dmaven.test.failure.ignore=true

      - name: Generar reporte Serenity
        if: always()
        run: mvn serenity:aggregate

      - name: Subir reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report-${{ github.run_number }}
          path: target/site/serenity
          retention-days: 30

