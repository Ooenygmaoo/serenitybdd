name: BrowserStack Tests - Windows & Mac (9 AM & 9 PM Colombia)

on:
  push:
    branches: [master]

  workflow_dispatch:   # Permite ejecución manual

  schedule:
    - cron: '0 14 * * *'   # 9:00 AM Colombia (UTC-5 → 14:00 UTC)
    - cron: '0 2 * * *'    # 9:00 PM Colombia (UTC-5 → 02:00 UTC del día siguiente)

jobs:
  test-windows:
    name: David - Windows 10 Chrome
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ☕ Configurar Java 17 con cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Verificar configuración BrowserStack
        run: |
          echo "🌍 Ejecutando tests en BrowserStack"
          echo "⏰ Hora de ejecución: $(date)"
          echo "🖥️  Plataforma: Windows 10 + Chrome Latest"
          echo "👤 Usuario: David (slash17)"
          echo "🌎 Zona horaria: America/Bogota (Colombia)"
          echo "✅ Verificando credenciales..."
          echo "   Usuario BrowserStack: ${{ secrets.BROWSERSTACK_USER }}"
          echo "   Access Key Length: ${#BROWSERSTACK_KEY}"
          echo "================================"
        env:
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: 🧪 Ejecutar test Windows (David)
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn clean verify \
            -Denvironment=browserstack \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}" \
            -Dcucumber.filter.tags="@windows" \
            -Dmaven.test.failure.ignore=true

      - name: 📊 Generar reporte Serenity - Windows
        if: always()
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn serenity:aggregate \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}"

      - name: 📦 Subir reporte Serenity - Windows
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-windows-report-${{ github.run_number }}
          path: target/site/serenity/
          retention-days: 30

  test-mac:
    name: Enzo - Mac OS Safari
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-windows  # Ejecutar después de Windows para no gastar paralelismo

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ☕ Configurar Java 17 con cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Verificar configuración BrowserStack
        run: |
          echo "🌍 Ejecutando tests en BrowserStack"
          echo "⏰ Hora de ejecución: $(date)"
          echo "🍎 Plataforma: Mac OS Monterey + Safari 15.6"
          echo "👤 Usuario: Enzo (enzo)"
          echo "🌎 Zona horaria: America/Bogota (Colombia)"
          echo "✅ Verificando credenciales..."
          echo "   Usuario BrowserStack: ${{ secrets.BROWSERSTACK_USER }}"
          echo "   Access Key Length: ${#BROWSERSTACK_KEY}"
          echo "================================"
        env:
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: 🧪 Ejecutar test Mac (Enzo)
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn clean verify \
            -Denvironment=browserstack \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}" \
            -Dcucumber.filter.tags="@mac" \
            -Dmaven.test.failure.ignore=true

      - name: 📊 Generar reporte Serenity - Mac
        if: always()
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn serenity:aggregate \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}"

      - name: 📦 Subir reporte Serenity - Mac
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-mac-report-${{ github.run_number }}
          path: target/site/serenity/
          retention-days: 30

  publish-summary:
    name: Publicar Resumen
    runs-on: ubuntu-latest
    needs: [test-windows, test-mac]
    if: always()

    steps:
      - name: 📋 Publicar resumen de resultados
        run: |
          echo "## 📊 Resultados BrowserStack - Múltiples Plataformas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Tests Ejecutados" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha**: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- **Usuario BrowserStack**: ${{ secrets.BROWSERSTACK_USER }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️  Plataformas Testadas" >> $GITHUB_STEP_SUMMARY
          echo "1. **Windows 10 + Chrome Latest** → Usuario: David (slash17)" >> $GITHUB_STEP_SUMMARY
          echo "2. **Mac OS Monterey + Safari 15.6** → Usuario: Enzo (enzo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Enlaces" >> $GITHUB_STEP_SUMMARY
          echo "- [📊 Dashboard BrowserStack](https://automate.browserstack.com/dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "- 📁 Reportes Serenity disponibles en Artifacts" >> $GITHUB_STEP_SUMMARY
