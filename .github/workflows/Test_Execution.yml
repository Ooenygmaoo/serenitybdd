name: BrowserStack Tests - Windows Chrome (9 AM & 9 PM Colombia)

on:
  push:
    branches: [master]

  workflow_dispatch:   # Permite ejecución manual

  schedule:
    - cron: '0 14 * * *'   # 9:00 AM Colombia (UTC-5 → 14:00 UTC)
    - cron: '0 2 * * *'    # 9:00 PM Colombia (UTC-5 → 02:00 UTC del día siguiente)


jobs:
  browserstack-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests en BrowserStack
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
        run: |
          echo "🚀 Iniciando tests en BrowserStack..."
          echo "Usuario BrowserStack: ${BROWSERSTACK_USER}"
          
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn clean verify \
            -Dcucumber.filter.tags="@webMuthematrix" \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}" \
            -Dwebdriver.driver=remote \
            -Dmaven.test.failure.ignore=true

      - name: Generar reporte Serenity
        if: always()
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
        run: |
          # Construir la URL completa de BrowserStack con las credenciales
          BROWSERSTACK_URL="https://${BROWSERSTACK_USER}:${BROWSERSTACK_KEY}@hub-cloud.browserstack.com/wd/hub"
          
          mvn serenity:aggregate \
            -DBROWSERSTACK_USER="${BROWSERSTACK_USER}" \
            -DBROWSERSTACK_KEY="${BROWSERSTACK_KEY}" \
            -DBROWSERSTACK_URL="${BROWSERSTACK_URL}"

      - name: Subir reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report-${{ github.run_number }}
          path: target/site/serenity
          retention-days: 30

