name: CPT K6 Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common curl
          curl https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Create results folder
        run: mkdir -p results

      - name: Run k6 test (JSON output)
        run: k6 run test.js --out json=results/result.json

      - name: Generate simple HTML report
        run: |
          echo "<html><body><h1>K6 Report</h1><pre>" > results/report.html
          cat results/result.json >> results/report.html
          echo "</pre></body></html>" >> results/report.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: results/